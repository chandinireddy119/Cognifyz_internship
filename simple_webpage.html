<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Webpage</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;margin:0;padding:40px;color:#222}
  .card{max-width:640px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08);padding:32px}
  h1{color:#2b4c7e;margin-top:0}
  img{width:100%;border-radius:8px;margin-top:16px}
  p{line-height:1.6;font-size:16px}
</style>
</head>
<body>
  <div class="card">
    <h1>Welcome to My Simple Webpage</h1>
    <p>This page was built using plain HTML and CSS as part of the Cognifyz Technologies Web Development Internship, Level 1 - Task 1. It demonstrates a heading, a paragraph, and an image.</p>
    <img src="https://picsum.photos/600/300" alt="Sample landscape image">
  </div>
</body>
</html>
