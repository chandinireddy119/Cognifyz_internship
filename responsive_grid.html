<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Grid - Bootstrap</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{background:#f4f6f8;padding:40px 20px}
  .box{background:#2b4c7e;color:#fff;padding:30px;border-radius:8px;text-align:center;margin-bottom:20px}
</style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4">Responsive Grid Layout</h2>
    <div class="row">
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 1</div></div>
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 2</div></div>
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 3</div></div>
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 4</div></div>
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 5</div></div>
      <div class="col-md-4 col-sm-6 col-12"><div class="box">Item 6</div></div>
    </div>
  </div>
</body>
</html>
