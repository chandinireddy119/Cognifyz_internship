<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Card - Bootstrap</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f4f6f8;padding:60px 20px}</style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <img src="https://picsum.photos/400/220" class="card-img-top" alt="Card image">
          <div class="card-body">
            <h5 class="card-title">Responsive Card Component</h5>
            <p class="card-text">This card is built with Bootstrap and automatically adapts to different screen sizes. Level 2 - Task 1.</p>
            <a href="#" class="btn btn-primary">Learn More</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
