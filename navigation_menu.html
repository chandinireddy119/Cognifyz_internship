<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation Menu</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f4f6f8}
  nav{background:#2b4c7e;display:flex;justify-content:center;gap:40px;padding:18px}
  nav a{color:#fff;text-decoration:none;font-weight:600;font-size:16px;padding:6px 12px;border-radius:6px;transition:background .2s}
  nav a:hover{background:#1e3a63}
  .content{padding:60px;text-align:center;color:#333}
</style>
</head>
<body>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
  <div class="content">
    <h1>Simple Navigation Menu</h1>
    <p>Level 1 - Task 1: A navigation menu with three links, built using HTML and CSS.</p>
  </div>
</body>
</html>
