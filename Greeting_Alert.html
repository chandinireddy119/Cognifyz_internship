<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Greeting Alert</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
  button{padding:16px 32px;font-size:18px;border:none;border-radius:8px;background:#2b4c7e;color:#fff;cursor:pointer}
</style>
</head>
<body>
  <button onclick="showGreeting()">Show Greeting</button>
  <script>
    function showGreeting(){
      const hour = new Date().getHours();
      let greeting;
      if (hour < 12) greeting = "Good Morning!";
      else if (hour < 18) greeting = "Good Afternoon!";
      else greeting = "Good Evening!";
      alert(greeting);
    }
  </script>
</body>
</html>
