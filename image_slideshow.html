<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Slideshow</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;text-align:center;padding:40px 20px}
  h1{color:#2b4c7e}
  .slideshow{position:relative;width:500px;max-width:90%;height:320px;margin:20px auto;border-radius:10px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.15)}
  .slideshow img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s ease-in-out}
  .slideshow img.active{opacity:1}
</style>
</head>
<body>
  <h1>Automatic Image Slideshow</h1>
  <p>Images transition automatically every 3 seconds. Level 3 - Task 1.</p>
  <div class="slideshow">
    <img src="https://picsum.photos/id/60/500/320" class="active" alt="Slide 1">
    <img src="https://picsum.photos/id/70/500/320" alt="Slide 2">
    <img src="https://picsum.photos/id/80/500/320" alt="Slide 3">
  </div>

  <script>
    const slides = document.querySelectorAll('.slideshow img');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 3000);
  </script>
</body>
</html>
