<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;text-align:center;padding:40px 20px}
  h1{color:#2b4c7e}
  .gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;margin-top:20px}
  .gallery img{width:160px;height:120px;object-fit:cover;border-radius:8px;cursor:pointer;transition:transform .25s;box-shadow:0 4px 10px rgba(0,0,0,.1)}
  .gallery img:hover{transform:scale(1.05)}

  .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);
    justify-content:center;align-items:center;z-index:10}
  .overlay.show{display:flex}
  .overlay img{max-width:80%;max-height:80%;border-radius:8px}
</style>
</head>
<body>
  <h1>Image Gallery</h1>
  <p>Click any thumbnail to enlarge it. Level 3 - Task 1.</p>
  <div class="gallery" id="gallery">
    <img src="https://picsum.photos/id/10/300/200" alt="Photo 1">
    <img src="https://picsum.photos/id/20/300/200" alt="Photo 2">
    <img src="https://picsum.photos/id/30/300/200" alt="Photo 3">
    <img src="https://picsum.photos/id/40/300/200" alt="Photo 4">
    <img src="https://picsum.photos/id/50/300/200" alt="Photo 5">
  </div>

  <div class="overlay" id="overlay" onclick="this.classList.remove('show')">
    <img id="overlayImg" src="" alt="Enlarged image">
  </div>

  <script>
    document.getElementById('gallery').addEventListener('click', e => {
      if (e.target.tagName === 'IMG'){
        document.getElementById('overlayImg').src = e.target.src;
        document.getElementById('overlay').classList.add('show');
      }
    });
  </script>
</body>
</html>
