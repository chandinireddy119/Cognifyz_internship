<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Webpage</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f4f6f8;color:#222}
  .container{max-width:900px;margin:0 auto;padding:40px 20px}
  .grid{display:flex;gap:20px;flex-wrap:wrap}
  .item{background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:20px;flex:1 1 260px}
  h1{color:#2b4c7e;text-align:center}

  @media (max-width: 600px){
    .grid{flex-direction:column}
    h1{font-size:24px}
    .item{padding:14px}
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Responsive Webpage with Media Queries</h1>
    <div class="grid">
      <div class="item"><h3>Feature One</h3><p>Resize the browser window to see the layout adapt to smaller screens.</p></div>
      <div class="item"><h3>Feature Two</h3><p>Built using pure CSS media queries. Level 2 - Task 2.</p></div>
      <div class="item"><h3>Feature Three</h3><p>Stacks vertically on mobile-sized viewports.</p></div>
    </div>
  </div>
</body>
</html>
