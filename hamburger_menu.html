<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile-Friendly Navigation</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;margin:0;background:#f4f6f8}
  nav{background:#2b4c7e;display:flex;justify-content:space-between;align-items:center;padding:16px 24px}
  .logo{color:#fff;font-weight:700;font-size:20px}
  .nav-links{list-style:none;display:flex;gap:30px;margin:0;padding:0}
  .nav-links a{color:#fff;text-decoration:none;font-weight:600}
  .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
  .hamburger span{width:26px;height:3px;background:#fff;border-radius:2px}
  .content{padding:60px;text-align:center}

  @media (max-width: 700px){
    .nav-links{
      display:none;
      flex-direction:column;
      position:absolute;
      top:60px;right:0;
      background:#2b4c7e;
      width:200px;
      padding:20px;
      gap:16px;
    }
    .nav-links.show{display:flex}
    .hamburger{display:flex}
  }
</style>
</head>
<body>
  <nav>
    <div class="logo">Cognifyz</div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#home">Home</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('show')">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="content">
    <h1>Mobile-Friendly Navigation Menu</h1>
    <p>Resize the window below 700px to see the hamburger menu appear. Level 2 - Task 2.</p>
  </div>
</body>
</html>
