<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basic Form</title>
<style>
  body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
  form{background:#fff;padding:32px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08);width:320px}
  h2{margin-top:0;color:#2b4c7e}
  label{display:block;margin-bottom:6px;font-weight:600;color:#444}
  input[type=text]{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;margin-bottom:20px;box-sizing:border-box;font-size:15px}
  button{width:100%;padding:12px;background:#2b4c7e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer}
  button:hover{background:#1e3a63}
</style>
</head>
<body>
  <form onsubmit="event.preventDefault(); alert('Form submitted!');">
    <h2>Subscribe</h2>
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Enter your name" required>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
